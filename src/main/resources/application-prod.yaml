spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000

jwt:
  expiration-time: 900000 # 15 минут
  refresh-expiration-time: 2592000000 # 30 дней

logging:
  level:
    root: INFO
    com.drivers: INFO
    org.hibernate: ERROR