server:
  port: ${PORT:8082}

spring:
  application:
    name: drivers-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/drivers_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
  api-docs:
    path: /v3/api-docs

jwt:
  secret: ${JWT_SECRET:asdfqwertyyasfasdfkljzxcvmbasjdlfhquktrieorguh}

external:
  factory-service:
    url: ${FACTORY_SERVICE_URL:https://factory-service-ab3j.onrender.com}
    products-path: ${FACTORY_SERVICE_PRODUCTS_PATH:/api/factory/products}