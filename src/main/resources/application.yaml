spring:
  profiles:
    active: dev
  application:
    name: drivers-service

  springdoc:
    swagger-ui:
      path: /swagger-ui.html
      operationsSorter: alpha
    api-docs:
      path: /v3/api-docs

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/drivers_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:g2S9x1nZb6VQ3p7tM8cJ5r2U1wY4l9NkQ0rTeHwXaEo}

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

jwt:
  expiration-time: 86400000 # 24h
  refresh-expiration-time: 2592000000 # 30d

logging:
  level:
    root: INFO
    com.drivers: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  springdoc:
    api-docs:
      enabled: false
    swagger-ui:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000

jwt:
  expiration-time: 900000 # 15min
  refresh-expiration-time: 2592000000 # 30d

logging:
  level:
    root: INFO
    com.drivers: INFO
    org.hibernate: ERROR