spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

jwt:
  expiration-time: 86400000 # 24 часа
  refresh-expiration-time: 2592000000 # 30 дней

logging:
  level:
    root: INFO
    com.drivers: DEBUG
    org.hibernate.SQL: DEBUG